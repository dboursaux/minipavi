<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Equinoxe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;display:flex;justify-content:center;padding:20px;min-height:100vh}
.panel{max-width:520px;width:100%}
h1{text-align:center;font-size:.85rem;color:#8b949e;letter-spacing:3px;margin-bottom:24px;text-transform:uppercase}
.status{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:20px;font-size:.75rem}
.dot{width:8px;height:8px;border-radius:50%;transition:background .3s;display:inline-block}
.dot.on{background:#3fb950}
.dot.off{background:#f85149}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card h2 .c{width:10px;height:10px;border-radius:2px}
.woofer .c{background:#f78166}
.tweeter .c{background:#7ee787}

.grp{margin-bottom:12px}
.grp:last-child{margin-bottom:0}
.grpl{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px}
.grpl .nm{color:#8b949e}
.grpl .vl{color:#e6edf3;font-weight:600;font-variant-numeric:tabular-nums}

input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;outline:none;background:#21262d}
.woofer input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #30363d;background:#f78166}
.tweeter input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #30363d;background:#7ee787}

input[type=number]{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:3px 6px;border-radius:4px;width:60px;font-size:.75rem;text-align:right}
input[type=number]:focus{outline:none;border-color:#58a6ff}

.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.presets button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:5px 12px;border-radius:6px;font-size:.7rem;cursor:pointer;transition:.2s}
.presets button:hover{background:#30363d;border-color:#58a6ff}

.mute-btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:4px 10px;border-radius:6px;font-size:.7rem;cursor:pointer;margin-left:auto}
.mute-btn.muted{background:#f85149;color:#fff;border-color:#f85149}
</style>
</head>
<body>
<div class="panel">
<h1>Equinoxe</h1>
<div class="status"><span class="dot off" id="dot"></span><span id="st">Connexion...</span></div>

<div class="card woofer">
<h2><span class="c"></span> Woofer — Canal gauche</h2>
<div class="grp"><div class="grpl"><span class="nm">Gain</span><span><input type="number" id="wg-n" value="0" min="-20" max="20" step="0.5"> <span class="vl">dB</span></span></div><input type="range" id="wg" min="-20" max="20" value="0" step="0.5"></div>
<div class="grp"><div class="grpl"><span class="nm">Frequence coupure</span><span class="vl" id="wfv">1000 Hz</span></div><input type="range" id="wf" min="200" max="3000" value="1000" step="50"></div>
<div class="grp"><div class="grpl"><span class="nm">Boost basses (gain)</span><span class="vl" id="bbv">10 dB</span></div><input type="range" id="bb-gain" min="0" max="20" value="10" step="0.5"></div>
<div class="grp"><div class="grpl"><span class="nm">Boost basses (frequence)</span><span class="vl" id="bbfv">200 Hz</span></div><input type="range" id="bb-freq" min="50" max="500" value="200" step="10"></div>
<button class="mute-btn" id="mute-w" onclick="toggleMute('w')">Mute woofer</button>
<div class="presets">
<button onclick="presetWoofer(0,1000,10,200)">Flat</button>
<button onclick="presetWoofer(4,800,12,180)">Bass+</button>
<button onclick="presetWoofer(8,800,16,150)">Bass++</button>
<button onclick="presetWoofer(0,1500,6,250)">Light</button>
</div>
</div>

<div class="card tweeter">
<h2><span class="c"></span> Tweeter — Canal droit</h2>
<div class="grp"><div class="grpl"><span class="nm">Gain</span><span><input type="number" id="tg-n" value="4" min="-20" max="20" step="0.5"> <span class="vl">dB</span></span></div><input type="range" id="tg" min="-20" max="20" value="4" step="0.5"></div>
<div class="grp"><div class="grpl"><span class="nm">Frequence coupure</span><span class="vl" id="tfv">1000 Hz</span></div><input type="range" id="tf" min="500" max="4000" value="1000" step="50"></div>
<button class="mute-btn" id="mute-t" onclick="toggleMute('t')">Mute tweeter</button>
<div class="presets">
<button onclick="presetTweeter(4,1000)">Default</button>
<button onclick="presetTweeter(2,1200)">Soft</button>
<button onclick="presetTweeter(6,800)">Bright</button>
<button onclick="presetTweeter(8,600)">Bright+</button>
</div>
</div>
</div>

<script>
(function(){
var HOST='100.113.111.3:1234', ws=null, muted={w:false,t:false};

function $id(id){return document.getElementById(id);}
function setDot(on){$id('dot').className='dot '+(on?'on':'off');}
function setStatus(text){$id('st').textContent=text;}

function send(cmd){
  if(ws && ws.readyState===1) ws.send(JSON.stringify(cmd));
}

function connect(){
  ws = new WebSocket('ws://'+HOST);
  ws.onopen = function(){
    setDot(true);
    setStatus('Connecte');
    loadConfig();
  };
  ws.onclose = function(){
    setDot(false);
    setStatus('Deconnecte - reconnexion...');
    setTimeout(connect, 2000);
  };
  ws.onerror = function(){
    setDot(false);
    setStatus('Erreur - reconnexion...');
  };
}

function loadConfig(){
  send('"GetConfig"');
  ws.onmessage = function(e){
    try {
      var d = JSON.parse(e.data);
      if(d.GetConfig && d.GetConfig.value){
        var y = d.GetConfig.value;
        var m = {};
        m.wg = parseFloat((y.match(/woofer_gain:[\s\S]*?gain:\s*([\d.]+)/)||[0,0])[1]);
        m.tg = parseFloat((y.match(/tweeter_gain:[\s\S]*?gain:\s*([\d.]+)/)||[0,4])[1]);
        m.bb = parseFloat((y.match(/bass_boost:[\s\S]*?gain:\s*([\d.]+)/)||[0,10])[1]);
        m.bbf = parseFloat((y.match(/bass_boost:[\s\S]*?freq:\s*([\d.]+)/)||[0,200])[1]);
        m.lpf = parseFloat((y.match(/lp1:[\s\S]*?freq:\s*([\d.]+)/)||[0,1000])[1]);
        m.hpf = parseFloat((y.match(/hp1:[\s\S]*?freq:\s*([\d.]+)/)||[0,1000])[1]);
        setSlider('wg','wg-n',m.wg);    $id('wg-n').nextElementSibling.textContent='dB';
        setSlider('tg','tg-n',m.tg);    $id('tg-n').nextElementSibling.textContent='dB';
        setSlider('bb-gain',null,m.bb);
        setSlider('bb-freq',null,m.bbf);
        $id('bbv').textContent = m.bb.toFixed(1) + ' dB';
        $id('bbfv').textContent = m.bbf + ' Hz';
        setSlider('wf',null,m.lpf);  $id('wfv').textContent = m.lpf + ' Hz';
        setSlider('tf',null,m.hpf);  $id('tfv').textContent = m.hpf + ' Hz';
        ws.onmessage = null;
      }
    } catch(ex) { console.log('Parse error:', ex); }
  };
}

function setSlider(sid, nid, val){
  $id(sid).value = val;
  if(nid) $id(nid).value = val;
}

function patch(o){
  send({'PatchConfig': {'filters': o}});
}

function toggleMute(c){
  muted[c] = !muted[c];
  var b = $id('mute-'+c);
  b.className = 'mute-btn' + (muted[c] ? ' muted' : '');
  b.textContent = muted[c] ? 'Unmute' : ('Mute '+(c=='w'?'woofer':'tweeter'));
  if(c==='w'){
    patch({woofer_gain:{parameters:{gain:muted.w?-100:parseFloat($id('wg').value),inverted:false,mute:muted.w}}});
  } else {
    patch({tweeter_gain:{parameters:{gain:muted.t?-100:parseFloat($id('tg').value),inverted:false,mute:muted.t}}});
  }
}

function presetWoofer(g,f,bb,bbf){
  setSlider('wg','wg-n',g);   $id('wg-n').nextElementSibling.textContent='dB';
  setSlider('wf',null,f);     $id('wfv').textContent = f + ' Hz';
  setSlider('bb-gain',null,bb); $id('bbv').textContent = bb.toFixed(1) + ' dB';
  setSlider('bb-freq',null,bbf); $id('bbfv').textContent = bbf + ' Hz';
  patch({woofer_gain:{parameters:{gain:g}},lp1:{parameters:{freq:f}},lp2:{parameters:{freq:f}},bass_boost:{parameters:{gain:bb,freq:bbf}}});
}

function presetTweeter(g,f){
  setSlider('tg','tg-n',g);   $id('tg-n').nextElementSibling.textContent='dB';
  setSlider('tf',null,f);     $id('tfv').textContent = f + ' Hz';
  patch({tweeter_gain:{parameters:{gain:g}},hp1:{parameters:{freq:f}},hp2:{parameters:{freq:f}}});
}

// --- Event handlers ---
function onSlider(id, patchFn){
  $id(id).oninput = function(){ patchFn(parseFloat(this.value)); };
}

onSlider('wg', function(v){
  $id('wg-n').value = v;
  patch({woofer_gain:{parameters:{gain:v,inverted:false,mute:false}}});
  if(muted.w){ muted.w=false; var b=$id('mute-w'); b.className='mute-btn'; b.textContent='Mute woofer'; }
});

onSlider('tg', function(v){
  $id('tg-n').value = v;
  patch({tweeter_gain:{parameters:{gain:v,inverted:false,mute:false}}});
  if(muted.t){ muted.t=false; var b=$id('mute-t'); b.className='mute-btn'; b.textContent='Mute tweeter'; }
});

onSlider('wf', function(v){
  $id('wfv').textContent = v + ' Hz';
  patch({lp1:{parameters:{freq:v}},lp2:{parameters:{freq:v}}});
});

onSlider('tf', function(v){
  $id('tfv').textContent = v + ' Hz';
  patch({hp1:{parameters:{freq:v}},hp2:{parameters:{freq:v}}});
});

function onBassChange(){
  var vg = parseFloat($id('bb-gain').value);
  var vf = parseInt($id('bb-freq').value);
  $id('bbv').textContent = vg.toFixed(1) + ' dB';
  $id('bbfv').textContent = vf + ' Hz';
  patch({bass_boost:{parameters:{gain:vg,freq:vf}}});
}

$id('bb-gain').oninput = onBassChange;
$id('bb-freq').oninput = onBassChange;

// Number inputs
$id('wg-n').onchange = function(){ var v=parseFloat(this.value); if(!isNaN(v)){ v=Math.max(-20,Math.min(20,v)); $id('wg').value=v; $id('wg').oninput(); } };
$id('tg-n').onchange = function(){ var v=parseFloat(this.value); if(!isNaN(v)){ v=Math.max(-20,Math.min(20,v)); $id('tg').value=v; $id('tg').oninput(); } };

connect();
})();
</script>
</body>
</html>
